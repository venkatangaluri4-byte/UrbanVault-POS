<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Urban Vault — POS</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR EXISTING STYLE (unchanged for brevity) */
</style>
</head>

<body>

<!-- KEEP YOUR NAV + LAYOUT SAME -->

<div class="layout">

  <!-- LEFT SIDE (UNCHANGED) -->
  <div class="left">
    <div class="section-title">Select product & size</div>
    <input class="search-bar" id="search" placeholder="Search..." oninput="renderProducts()">
    <div class="prod-grid" id="prodGrid"></div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="cart-title">Cart</div>
    <div id="cartItems"></div>

    <div class="cart-total">
      <span>Total</span>
      <span class="amount" id="cartTotal">$0.00</span>
    </div>

    <select id="payMethod" class="pay-select">
      <option value="cash">Cash</option>
      <option value="card">Card</option>
      <option value="transfer">Transfer</option>
    </select>

    <button id="btnSale" class="btn-sale" onclick="completeSale()">Complete Sale</button>
    <button class="btn-clear" onclick="clearCart()">Clear cart</button>

    <!-- ✅ EXPENSE SECTION -->
    <div style="margin-top:20px;border-top:1px solid #333;padding-top:15px">

      <div style="font-size:11px;color:#aaa;margin-bottom:8px">
        Add Expense
      </div>

      <input id="etitle" placeholder="Expense (Rent, Ads...)">
      <input id="eamount" type="number" placeholder="Amount">

      <button onclick="addExpense()">Add Expense</button>

    </div>

    <div id="msg"></div>

  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = id => document.getElementById(id);

let allProducts = [], allInventory = [], cart = [];

// LOAD DATA
async function loadData() {
  const { data: p } = await client.from("products").select("*");
  const { data: i } = await client.from("inventory").select("*");

  allProducts = p || [];
  allInventory = i || [];
  renderProducts();
}

// PRODUCTS
function renderProducts() {
  $("prodGrid").innerHTML = allProducts.map(p => `
    <div>
      ${p.name} - $${p.selling_price}
      <button onclick="addToCart('${p.id}','${p.name}',${p.selling_price})">Add</button>
    </div>
  `).join("");
}

// CART
function addToCart(id,name,price){
  const item = cart.find(x=>x.id===id);
  if(item) item.qty++;
  else cart.push({id,name,price,qty:1});
  renderCart();
}

function renderCart(){
  $("cartItems").innerHTML = cart.map(i=>`
    <div>${i.name} x${i.qty}</div>
  `).join("");

  const total = cart.reduce((s,x)=>s+x.qty*x.price,0);
  $("cartTotal").innerText = "$"+total;
}

function clearCart(){ cart=[]; renderCart(); }

// SALE
async function completeSale(){
  const total = cart.reduce((s,x)=>s+x.qty*x.price,0);

  const { data:sale } = await client.from("sales").insert([{
    total,
    payment_method: $("payMethod").value
  }]).select().single();

  await client.from("sale_items").insert(
    cart.map(i=>({
      sale_id:sale.id,
      product_id:i.id,
      quantity:i.qty,
      price_at_sale:i.price
    }))
  );

  alert("Sale done");
  cart=[];
  renderCart();
}

// ✅ EXPENSE FUNCTION (ALREADY INCLUDED)
async function addExpense(){
  const title = $("etitle").value;
  const amount = Number($("eamount").value);

  if(!title || !amount){
    return alert("Enter expense");
  }

  const { error } = await client.from("expenses").insert([{
    title,
    amount
  }]);

  if(error){
    alert(error.message);
  } else {
    alert("Expense added");
    $("etitle").value="";
    $("eamount").value="";
  }
}

loadData();

</script>

</body>
</html>
