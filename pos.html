<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Urban Vault — POS</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body { font-family:'DM Sans'; background:#141a0e; color:#f0ede6; }
.layout { display:flex; }
.left { width:70%; padding:20px; }
.right { width:30%; padding:20px; background:#1c2413; }

.card { background:#232e18; padding:10px; margin-bottom:10px; border-radius:8px; }

button { padding:8px; margin-top:5px; width:100%; }

input { width:100%; padding:8px; margin-bottom:5px; }
</style>
</head>

<body>

<div class="layout">

<div class="left">
<h3>Products</h3>
<div id="products"></div>
</div>

<div class="right">

<h3>Cart</h3>
<div id="cart"></div>

<h3>Total: <span id="total">$0</span></h3>

<select id="payMethod">
<option value="cash">Cash</option>
<option value="card">Card</option>
<option value="transfer">Transfer</option>
</select>

<button onclick="checkout()">Complete Sale</button>

<hr>

<h3>Add Expense</h3>

<input id="etitle" placeholder="Expense name">
<input id="eamount" type="number" placeholder="Amount">

<button onclick="addExpense()">Add Expense</button>

</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products=[],cart=[];

async function load(){
const {data}=await client.from("products").select("*");
products=data||[];
render();
}

function render(){
document.getElementById("products").innerHTML=products.map(p=>`
<div class="card">
${p.name}<br>
$${p.selling_price}
<button onclick="add('${p.id}','${p.name}',${p.selling_price})">Add</button>
</div>`).join("");
renderCart();
}

function add(id,name,price){
const item=cart.find(x=>x.id===id);
if(item)item.qty++;
else cart.push({id,name,price,qty:1});
renderCart();
}

function renderCart(){
document.getElementById("cart").innerHTML=cart.map(i=>`
<div>
${i.name} x${i.qty} = $${i.qty*i.price}
</div>`).join("");

const total=cart.reduce((s,x)=>s+x.qty*x.price,0);
document.getElementById("total").innerText="$"+total;
}

async function checkout(){
const total=cart.reduce((s,x)=>s+x.qty*x.price,0);

const {data:sale}=await client.from("sales").insert([{
total,
payment_method:document.getElementById("payMethod").value
}]).select().single();

await client.from("sale_items").insert(
cart.map(i=>({
sale_id:sale.id,
product_id:i.id,
quantity:i.qty,
price_at_sale:i.price
}))
);

alert("Sale done");
cart=[];
renderCart();
}

async function addExpense(){
const title=document.getElementById("etitle").value;
const amount=Number(document.getElementById("eamount").value);

if(!title||!amount) return alert("Enter expense");

const {error}=await client.from("expenses").insert([{title,amount}]);

if(error) alert(error.message);
else{
alert("Expense added");
document.getElementById("etitle").value="";
document.getElementById("eamount").value="";
}
}

load();
</script>

</body>
</html>
