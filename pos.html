<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Urban Vault — POS</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'DM Sans'; background:#141a0e; color:#f0ede6; }

nav { background:#1c2413; padding:10px 20px; display:flex; gap:12px; }
nav a { color:#aaa; text-decoration:none; }
nav a.active { color:#d4af37; }

.layout { display:flex; }
.left { width:65%; padding:20px; }
.right { width:35%; background:#1c2413; padding:20px; border-left:1px solid #333; }

.card { background:#232e18; padding:10px; margin-bottom:10px; border-radius:8px; }

button { background:#d4af37; border:none; padding:6px 10px; cursor:pointer; border-radius:4px; }

input, select {
  width:100%; padding:8px; margin-bottom:8px;
  background:#232e18; border:1px solid #333; color:#fff;
}

.prod-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

.total { font-size:22px; margin:10px 0; }
</style>
</head>

<body>

<nav>
  <a href="index.html">Dashboard</a>
  <a href="pos.html" class="active">POS</a>
  <a href="products.html">Products</a>
  <a href="sales.html">Sales</a>
  <a href="pl.html">P&L</a>
  <a href="customers.html">Customers</a>
</nav>

<div class="layout">

<div class="left">
<h3>Select Product</h3>
<input id="search" placeholder="Search..." oninput="renderProducts()">
<div id="products" class="prod-grid"></div>
</div>

<div class="right">

<h3>Cart</h3>
<div id="cart"></div>

<div class="total">Total: $<span id="total">0</span></div>

<select id="payMethod">
<option value="cash">Cash</option>
<option value="card">Card</option>
<option value="transfer">Transfer</option>
</select>

<button onclick="checkout()">Complete Sale</button>
<button onclick="clearCart()">Clear Cart</button>

<hr>

<h4>Add Expense</h4>

<input id="etitle" placeholder="Expense name">
<input id="eamount" type="number" placeholder="Amount">

<button onclick="addExpense()">Add Expense</button>

</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let inventory = [];
let cart = [];

// LOAD DATA
async function load(){
  const {data: p} = await client.from("products").select("*");
  const {data: i} = await client.from("inventory").select("*");

  products = p || [];
  inventory = i || [];

  renderProducts();
}

// RENDER PRODUCTS (FIXED - NO DUPLICATES)
function renderProducts(){
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(q)
  );

  document.getElementById("products").innerHTML = filtered.map(p => {

    const sizes = inventory
      .filter(i => i.product_id === p.id && i.quantity > 0)
      .map(i => `
        <button onclick="add('${p.id}','${p.name}','${p.color}','${i.size}',${p.selling_price})">
          ${i.size}
        </button>
      `).join("");

    return `
      <div class="card">
        <b>${p.name}</b><br>
        ${p.color || ""}<br>
        $${p.selling_price}
        <div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap">
          ${sizes || '<span style="color:#777">Out of stock</span>'}
        </div>
      </div>
    `;
  }).join("");
}

// ADD TO CART
function add(id,name,color,size,price){
  const item = cart.find(x => x.id===id && x.size===size);

  if(item) item.qty++;
  else cart.push({id,name,color,size,price,qty:1});

  renderCart();
}

// RENDER CART
function renderCart(){
  document.getElementById("cart").innerHTML = cart.map(i=>`
    <div>
      ${i.name} (${i.color || ""} ${i.size}) x${i.qty} = $${i.qty*i.price}
    </div>
  `).join("");

  const total = cart.reduce((s,x)=>s+x.qty*x.price,0);
  document.getElementById("total").innerText = total;
}

// CLEAR CART
function clearCart(){
  cart=[];
  renderCart();
}

// CHECKOUT
async function checkout(){
  const total = cart.reduce((s,x)=>s+x.qty*x.price,0);

  const {data:sale,error} = await client.from("sales").insert([{
    total,
    payment_method: document.getElementById("payMethod").value
  }]).select().single();

  if(error) return alert(error.message);

  await client.from("sale_items").insert(
    cart.map(i=>({
      sale_id:sale.id,
      product_id:i.id,
      size:i.size,
      quantity:i.qty,
      price_at_sale:i.price
    }))
  );

  alert("Sale complete");
  cart=[];
  renderCart();
}

// ADD EXPENSE
async function addExpense(){
  const title = document.getElementById("etitle").value;
  const amount = Number(document.getElementById("eamount").value);

  if(!title || !amount) return alert("Enter expense");

  const {error} = await client.from("expenses").insert([{title,amount}]);

  if(error) alert(error.message);
  else{
    alert("Expense added");
    document.getElementById("etitle").value="";
    document.getElementById("eamount").value="";
  }
}

load();
</script>

</body>
</html>
