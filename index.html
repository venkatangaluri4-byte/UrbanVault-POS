<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Urban Vault — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans'; background:#141a0e; color:#f0ede6; }
.page { padding:20px; max-width:1100px; margin:auto; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
.card { background:#232e18; padding:15px; border-radius:10px; }
.title { font-family:'Bebas Neue'; font-size:28px; color:#d4af37; }
</style>
</head>

<body>

<div class="page">

<h2 class="title">Dashboard</h2>

<div class="stats-grid" id="stats"></div>

<h3>Stock Overview</h3>
<div id="stock"></div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {

const [{data:p},{data:pur},{data:si},{data:inv},{data:exp}] = await Promise.all([
client.from("products").select("*"),
client.from("purchases").select("*"),
client.from("sale_items").select("*"),
client.from("inventory").select("*"),
client.from("expenses").select("*")
]);

let investment=0,revenue=0,sold=0,expenses=0;

p.forEach(prod=>{
pur.filter(x=>x.product_id===prod.id).forEach(b=>{
investment+=b.quantity*b.cost_per_unit;
});

const items=si.filter(x=>x.product_id===prod.id);
const qty=items.reduce((s,x)=>s+x.quantity,0);

revenue+=qty*prod.selling_price;
sold+=qty;
});

(exp||[]).forEach(e=>expenses+=e.amount);

const profit = revenue - investment - expenses;

document.getElementById("stats").innerHTML = `
<div class="card">Investment<br><b>$${investment.toFixed(2)}</b></div>
<div class="card">Revenue<br><b>$${revenue.toFixed(2)}</b></div>
<div class="card">Expenses<br><b>$${expenses.toFixed(2)}</b></div>
<div class="card">Profit<br><b>$${profit.toFixed(2)}</b></div>
<div class="card">Items Sold<br><b>${sold}</b></div>
`;

const stockMap={};
inv.forEach(i=>{
stockMap[i.product_id]=(stockMap[i.product_id]||0)+i.quantity;
});

document.getElementById("stock").innerHTML = `
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
${p.map(prod=>{
const stock=stockMap[prod.id]||0;
return `
<div class="card" style="border:${stock<3?'1px solid red':'1px solid #333'}">
${prod.name}<br>
${prod.color||''}<br>
<b>${stock}</b><br>
${stock<3?'Low stock':''}
</div>`;
}).join("")}
</div>`;
}

load();
</script>

</body>
</html>
