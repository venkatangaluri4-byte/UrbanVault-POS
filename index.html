<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Vault — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #d4af37;
    --gold-dim: #a8892a;
    --bg: #141a0e;
    --bg2: #1c2413;
    --bg3: #232e18;
    --surface: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --text: #f0ede6;
    --muted: rgba(240,237,230,0.5);
    --danger: #f87171;
    --success: #86efac;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 20px;
    height: 52px;
  }

  .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    margin-right: 24px;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
  }

  nav a.active { color: var(--gold); }

  .page { padding: 28px 24px; max-width: 1100px; margin: auto; }

  .page-title {
    font-family: 'Bebas Neue';
    font-size: 32px;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }

  .slabel { font-size: 11px; color: var(--muted); }
  .svalue { font-family: 'Bebas Neue'; font-size: 28px; color: var(--gold); }

  .section-title {
    font-size: 13px;
    color: var(--muted);
    margin: 20px 0 10px;
  }

</style>
</head>
<body>

<nav>
  <div class="nav-brand">Urban Vault</div>
  <a href="index.html" class="active">Dashboard</a>
  <a href="pos.html">POS</a>
  <a href="products.html">Products</a>
  <a href="sales.html">Sales</a>
  <a href="pl.html">P&L</a>
  <a href="customers.html">Customers</a>
</nav>

<div class="page">
  <div class="page-title">Dashboard</div>

  <div class="stats-grid" id="stats"></div>

  <div class="section-title">Stock Overview</div>
  <div id="lowstock"></div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = id => document.getElementById(id);

async function load() {
  const [{ data: products }, { data: purchases }, { data: saleItems }, { data: inventory }] = await Promise.all([
    client.from("products").select("*"),
    client.from("purchases").select("*"),
    client.from("sale_items").select("*"),
    client.from("inventory").select("*")
  ]);

  const p = products || [], pur = purchases || [], si = saleItems || [], inv = inventory || [];

  let totalInvestment = 0, totalRevenue = 0, totalSold = 0;

  p.forEach(prod => {
    pur.filter(x => x.product_id === prod.id).forEach(b => {
      totalInvestment += b.quantity * b.cost_per_unit;
    });

    const items = si.filter(x => x.product_id === prod.id);
    const qty = items.reduce((s, x) => s + x.quantity, 0);

    totalRevenue += qty * prod.selling_price;
    totalSold += qty;
  });

  const profit = totalRevenue - totalInvestment;

  $("stats").innerHTML = `
    <div class="stat-card"><div class="slabel">Revenue</div><div class="svalue">$${totalRevenue.toFixed(2)}</div></div>
    <div class="stat-card"><div class="slabel">Profit</div><div class="svalue">$${profit.toFixed(2)}</div></div>
    <div class="stat-card"><div class="slabel">Items Sold</div><div class="svalue">${totalSold}</div></div>
    <div class="stat-card"><div class="slabel">Products</div><div class="svalue">${p.length}</div></div>
  `;

  // 🔥 STOCK AGGREGATION
  const stockMap = {};

  inv.forEach(i => {
    stockMap[i.product_id] = (stockMap[i.product_id] || 0) + i.quantity;
  });

  const stockList = p.map(prod => ({
    ...prod,
    stock: stockMap[prod.id] || 0
  }));

  $("lowstock").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">
      ${stockList.map(prod => `
        <div style="
          background: var(--bg3);
          border: 1px solid ${prod.stock < 3 ? 'var(--danger)' : 'var(--border)'};
          border-radius: 10px;
          padding: 12px;
        ">
          <div>${prod.name}</div>
          <div style="color:var(--muted);font-size:12px">${prod.color || ""}</div>
          <div style="font-size:26px;color:${prod.stock < 3 ? 'red' : 'var(--gold)'}">${prod.stock}</div>
          <div style="font-size:11px">${prod.stock < 3 ? 'Low stock' : 'In stock'}</div>
        </div>
      `).join("")}
    </div>
  `;
}

load();
</script>
</body>
</html>
