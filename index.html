<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Urban Vault — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body { font-family:'DM Sans'; background:#141a0e; color:#f0ede6; }

/* NAV */
nav {
  background:#1c2413;
  padding:10px 20px;
  display:flex;
  gap:10px;
}
nav a {
  color:#aaa;
  text-decoration:none;
}
nav a.active { color:#d4af37; }

/* PAGE */
.page { padding:20px; max-width:1100px; margin:auto; }

.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.card {
  background:#232e18;
  padding:15px;
  border-radius:10px;
}

.title {
  font-family:'Bebas Neue';
  font-size:28px;
  color:#d4af37;
  margin-bottom:15px;
}

.stock-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
</style>
</head>

<body>

<!-- ✅ NAV RESTORED -->
<nav>
  <a href="index.html" class="active">Dashboard</a>
  <a href="pos.html">POS</a>
  <a href="products.html">Products</a>
  <a href="sales.html">Sales</a>
  <a href="pl.html">P&L</a>
  <a href="customers.html">Customers</a>
</nav>

<div class="page">

<div class="title">Dashboard</div>

<div class="stats" id="stats"></div>

<h3>Stock Overview</h3>
<div id="stock" class="stock-grid"></div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {

const { data: p } = await client.from("products").select("*");
const { data: pur } = await client.from("purchases").select("*");
const { data: si } = await client.from("sale_items").select("*");
const { data: inv } = await client.from("inventory").select("*");
const { data: exp } = await client.from("expenses").select("*");

const products = p || [];
const purchases = pur || [];
const saleItems = si || [];
const inventory = inv || [];
const expenses = exp || [];

let investment=0,revenue=0,sold=0,expenseTotal=0;

products.forEach(prod=>{
  purchases.filter(x=>x.product_id===prod.id)
    .forEach(b=>investment+=b.quantity*b.cost_per_unit);

  const items=saleItems.filter(x=>x.product_id===prod.id);
  const qty=items.reduce((s,x)=>s+x.quantity,0);

  revenue+=qty*prod.selling_price;
  sold+=qty;
});

expenses.forEach(e=>expenseTotal+=Number(e.amount)||0);

const profit=revenue-investment-expenseTotal;

document.getElementById("stats").innerHTML=`
<div class="card">Investment<br><b>$${investment.toFixed(2)}</b></div>
<div class="card">Revenue<br><b>$${revenue.toFixed(2)}</b></div>
<div class="card">Expenses<br><b>$${expenseTotal.toFixed(2)}</b></div>
<div class="card">Profit<br><b>$${profit.toFixed(2)}</b></div>
<div class="card">Items Sold<br><b>${sold}</b></div>
`;

// STOCK
const stockMap={};
inventory.forEach(i=>{
  stockMap[i.product_id]=(stockMap[i.product_id]||0)+i.quantity;
});

document.getElementById("stock").innerHTML=products.map(prod=>{
  const stock=stockMap[prod.id]||0;

  return `
  <div class="card" style="border:${stock<3?'1px solid red':'1px solid #333'}">
    ${prod.name}<br>
    <span style="color:#aaa">${prod.color||""}</span><br>
    <b style="font-size:22px">${stock}</b><br>
    <span style="font-size:12px">${stock<3?'Low stock':'In stock'}</span>
  </div>`;
}).join("");

}

load();
</script>

</body>
</html>
