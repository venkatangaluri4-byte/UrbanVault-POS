<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Vault — Sales</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #d4af37;
  --bg: #141a0e; --bg2: #1c2413; --bg3: #232e18;
  --surface: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #f0ede6; --muted: rgba(240,237,230,0.5);
  --danger: #f87171; --success: #86efac;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 52px;
}

.nav-brand {
  font-family: 'Bebas Neue';
  font-size: 22px;
  color: var(--gold);
  margin-right: 24px;
}

nav a {
  color: var(--muted);
  text-decoration: none;
  padding: 6px 14px;
}

nav a.active { color: var(--gold); }

.page {
  padding: 24px;
  max-width: 1000px;
  margin: auto;
}

.page-title {
  font-family: 'Bebas Neue';
  font-size: 32px;
  color: var(--gold);
  margin-bottom: 20px;
}

.top-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }

input, select {
  background: var(--bg3);
  border:1px solid var(--border);
  color:#fff;
  padding:8px;
}

button {
  background: var(--gold);
  border:none;
  padding:8px 12px;
  cursor:pointer;
}

.stat-row { display:flex; gap:10px; margin-bottom:20px; }

.mini-stat {
  background: var(--bg3);
  padding:10px;
  border-radius:8px;
}

table { width:100%; border-collapse: collapse; }

th, td {
  padding:10px;
  border-bottom:1px solid var(--border);
}

.items-list {
  font-size:12px;
  color: var(--muted);
}
</style>
</head>

<body>

<nav>
  <div class="nav-brand">Urban Vault</div>
  <a href="index.html">Dashboard</a>
  <a href="pos.html">POS</a>
  <a href="products.html">Products</a>
  <a href="sales.html" class="active">Sales</a>
  <a href="pl.html">P&L</a>
  <a href="customers.html">Customers</a>
</nav>

<div class="page">

<div class="page-title">Sales History</div>

<div class="top-bar">
<input type="date" id="dateFrom">
<input type="date" id="dateTo">

<select id="payFilter">
<option value="">All</option>
<option value="cash">Cash</option>
<option value="card">Card</option>
<option value="transfer">Transfer</option>
</select>

<button onclick="loadSales()">Filter</button>
<button onclick="resetFilter()">Reset</button>
</div>

<div id="statRow"></div>
<div id="salesTable"></div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function resetFilter(){
  document.getElementById("dateFrom").value="";
  document.getElementById("dateTo").value="";
  document.getElementById("payFilter").value="";
  loadSales();
}

async function loadSales(){

const {data:sales}=await client.from("sales").select("*");
const {data:items}=await client.from("sale_items").select("*");
const {data:products}=await client.from("products").select("*");

const pmap={};
products.forEach(p=>pmap[p.id]=p);

let html=`<table>
<tr>
<th>Date</th>
<th>Payment</th>
<th>Items</th>
<th>Total</th>
<th>Action</th>
</tr>`;

sales.forEach(s=>{

const list=items
.filter(i=>i.sale_id===s.id)
.map(i=>{
const p=pmap[i.product_id];
return `${p?.name||""} (${p?.color||""} ${i.size}) x${i.quantity}`;
}).join("<br>");

html+=`
<tr>
<td>${new Date(s.created_at).toLocaleDateString()}</td>
<td>${s.payment_method}</td>
<td class="items-list">${list||"-"}</td>
<td>$${s.total}</td>
<td><button onclick="deleteSale('${s.id}')">Delete</button></td>
</tr>`;
});

document.getElementById("salesTable").innerHTML=html+"</table>";
}

async function deleteSale(id){
if(!confirm("Delete sale?")) return;

await client.from("sale_items").delete().eq("sale_id",id);
await client.from("sales").delete().eq("id",id);

loadSales();
}

loadSales();
</script>

</body>
</html>
